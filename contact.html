<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — ASHLEY CROCKETT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080810;--card:#13131e;--border:rgba(255,255,255,0.07);--green:#00ff8c;--pink:#ff2d82;--text:#f0f0f8;--muted:#5a5a72;--muted2:#888899;--ios-bg:rgba(22,22,30,0.92);--ios-border:rgba(255,255,255,0.1);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;cursor:none;overflow-x:hidden;}
  .cursor{position:fixed;width:10px;height:10px;background:var(--pink);border-radius:50%;pointer-events:none;z-index:9999;}
  .cursor-ring{position:fixed;width:32px;height:32px;border:1.5px solid var(--green);border-radius:50%;pointer-events:none;z-index:9998;opacity:.5;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(255,45,130,.07) 0,transparent 70%),radial-gradient(ellipse 60% 40% at 50% 0%,rgba(0,255,140,.04) 0,transparent 70%);}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
  nav{position:fixed;top:0;left:0;right:0;z-index:500;height:60px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(24px);background:rgba(8,8,16,.8);border-bottom:1px solid var(--border);}
  .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);}
  .nav-dot{width:8px;height:8px;border-radius:50%;background:var(--pink);animation:pulse 2s infinite;}
  .nav-links{display:flex;gap:32px;list-style:none;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .nav-links a{color:inherit;text-decoration:none;transition:color .2s;}
  .nav-links a:hover{color:var(--green);}
  .nav-links a.active{color:var(--pink);}
  .hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:4px;cursor:pointer;}
.hamburger span{width:22px;height:2px;background:var(--text);border-radius:2px;display:block;}

@media(max-width:900px){
  nav{padding:0 20px;}
  .hamburger{display:flex;}
  .nav-links{display:none;flex-direction:column;position:fixed;top:60px;left:0;right:0;background:rgba(8,8,16,.97);padding:24px 32px;gap:20px;border-bottom:1px solid var(--border);list-style:none;}
  .nav-links.open{display:flex;}
}
  ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--pink);border-radius:2px;}

  .page{padding:0 48px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:1;text-align:center;}
  .page-eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--pink);margin-bottom:18px;}
  .page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(60px,9vw,120px);letter-spacing:-.05em;line-height:.88;margin-bottom:28px;}
  .page-title .s{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:var(--green);}
  .page-sub{font-size:13px;color:var(--muted2);max-width:420px;margin:0 auto 48px;line-height:1.8;}

  .c-chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
  .cc{display:flex;align-items:center;gap:10px;background:var(--ios-bg);border:1px solid var(--ios-border);border-radius:100px;padding:10px 22px;text-decoration:none;color:var(--text);font-size:12px;letter-spacing:.06em;backdrop-filter:blur(20px);transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.3);}
  .cc:hover{border-color:rgba(255,45,130,.4);color:var(--pink);transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,45,130,.2);}
  .cc-ico{font-size:14px;}
  .cc.main-cc{background:var(--pink);border-color:var(--pink);color:#fff;font-family:'Syne',sans-serif;font-weight:700;padding:14px 32px;font-size:13px;box-shadow:0 4px 20px rgba(255,45,130,.4);}
  .cc.main-cc:hover{color:#fff;box-shadow:0 10px 36px rgba(255,45,130,.55);}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="index.html" class="nav-logo"><div class="nav-dot"></div>AC.
  <ul class="nav-links">
    <li><a href="skills.html">Skills</a></li>
    <li><a href="work.html">Work</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
  <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')">
  <span></span><span></span><span></span>
</button>
</nav>

<div class="page">
  <div class="page-eyebrow">Let's build something</div>
  <h1 class="page-title">Say<br><span class="s">hello.</span></h1>
  <p class="page-sub">Whether it's a project role, a collaboration, a speaking engagment, or just a consultation, lets build your vision together.</p>
  <div class="c-chips">
    <a href="mailto:inquire.aseology@gmail.com" class="cc main-cc"><span class="cc-ico">✉</span> Email me</a>
    <a href="https://www.linkedin.com/in/ashley-crockett-04a949223?utm_source=share_via&utm_content=profile&utm_medium=member_ios" class="cc"><span class="cc-ico">💼</span> LinkedIn</a>
    <a href="https://github.com/aseology" class="cc"><span class="cc-ico">🐙</span> GitHub</a>
<a href="ACPMResume2026.pdf" download class="cc"><span class="cc-ico">↓</span> Resume</a>  </div>
</div>

<script>
  const cursor=document.getElementById("cursor"),ring=document.getElementById("cursorRing");
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx-5+"px";cursor.style.top=my-5+"px";});
  (function a(){rx+=(mx-rx-16)*.1;ry+=(my-ry-16)*.1;ring.style.left=rx+"px";ring.style.top=ry+"px";requestAnimationFrame(a);})();
</script>
</body>
</html>
